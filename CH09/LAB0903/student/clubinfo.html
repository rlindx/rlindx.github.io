<!DOCTYPE html>

<html lang="en">

<!--
		Group members:  Rob Lindauer
		Filename:  clubinfo.html
		Date:  2026-04-24
		Purpose:  Permits a visitor to scroll through a list of student clubs/organizations, and also to perform a search for clubs matching user-specified criteria
	-->

<head>

    <title>CCSU Student Clubs - Search for Clubs</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="images/bluedevil-favicon-32x32.png">

</head>

<body>

    <header>

        <h1 class="centered">Find a Club</h1>
        <p class="tab-desk centered">Make the Most of Your Life at CCSU!</p>

    </header>

    <nav>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="clubinfo.html">Student Clubs</a></li>
            <li><a href="eventinfo.html">Event Calendar</a></li>
            <li><a href="request.html">Add a Club or Event</a>
                <li><a href="contact.html">Contact Us</a></li>
        </ul>

    </nav>


    <main>

        <div id="hero" class="tab-desk">

            <img class="centered" src="images/student-group-sitting.jpg" alt="group of students sitting against a wall">

        </div>

        <br>

        <!-- Use grid to govern whether club list and club search are stacked vertically (mobile viewport) of side-by-side (tablet and desktop viewports) -->

        <div class="grid">

            <figure>
                <!-- use image to simulate scrollable list -->

                <img class="centered" src="images/clublist.jpg" alt="scrollable list of student clubs and organizations">

            </figure>

            <form>

                <fieldset>

                    <legend>Club Search</legend>

                    <label for="cDesc">Please enter any search keywords (e.g., part of club name)</label>

                    <br>

                    <textarea id="cDesc" name="eDesc" rows="2" cols="60"></textarea>

                </fieldset>

                <input type="submit" id="submit" value="Submit Search" class="btn">

            </form>

        </div>


    </main>


    <footer>
        <p class="tel-link"><a href="tel:8885551212">(888)&nbsp;555-1212</a></p>
        <p><a class="email-link" href="mailto:studentclubs@ccsu.edu">studentclubs@ccsu.edu</a></p>
        <p class="tab-desk">
            <a href="http://www.ccsu.edu"><img class="centered" src="images/ccsu-logo.png" alt="CCSU Logo"></a>
        </p>
        <p class="mobile"><a href="http://www.ccsu.edu">www.ccsu.edu</a>
    </footer>

</body>

</html>
