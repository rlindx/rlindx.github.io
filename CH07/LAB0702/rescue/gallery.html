            <figure> /* Figure element 01 */

                <figcaption>Russ is a blind deer. He was brought to us by a hunter who found him wandering in circles.</figcaption>

            <figure> /* Figure element 02 */
                <img class="round" src="images/baby-squirrel.jpg" alt="baby squirrel on a treehouse">
                <figcaption>Meet Nugget. He is learning how to climb trees and will be released in a few more weeks.</figcaption>
            </figure>

            <figure> /* Figure element 03 */
                <img class="round" src="images/cow.jpg" alt="face of a cow">
                <figcaption>This is Ellie. She was neglected by her owner and was severely malnourished when she was rescued.</figcaption>
            </figure>

            <figure> /* Figure element 04 */
                <img class="round" src="images/goat.jpg" alt="goat lying on the grass">
                <figcaption>Say "Hi" to Vinny. His back legs were injured, making it difficult for him to get around.</figcaption>
            </figure>

            <figure> /* Figure element 05 */
                <img class="round" src="images/pig.jpg" alt="pig standing">
                <figcaption>Rosie was just a baby when she arrived. Now she has babies of her own.</figcaption>
            </figure>

            <figure> /* Figure element 06 */
                <img class="round" src="images/baby-pig.jpg" alt="baby pig standing">
                <figcaption>Squirt is one of Rosie's babies.</figcaption>
            </figure>

            <figure> /* Figure element 07 */
                <img class="round" src="images/horse.jpg" alt="face of a horse">
                <figcaption>Muffin has come a long way. She was very thin when she was rescued.</figcaption>
            </figure>

            <figure> /* Figure element 08 */
                <img class="round" src="images/hawk.jpg" alt="baby hawk">
                <figcaption>Poor Harley was rescued when he was just three weeks old. He is getting big and will be released in about a month.</figcaption>
            </figure>

            <figure> /* Figure element 09 */
                <img class="round" src="images/bearded-dragon.jpg" alt="bearded dragon">
                <figcaption>Gizmo was abandoned by his owner and is available for adoption.</figcaption>
            </figure>

            <figure> /* Figure element 10 */
                <img class="round" src="images/bird.jpg" alt="cockatoo">

            </figure>

            <figure> /* Figure element 11 */

                <img class="round" src="images/tortoise-pyramid.jpg" alt="tortoise with shell pyramiding">
